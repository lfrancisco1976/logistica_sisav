<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Logística</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .detail-grid { display: none; }
        .expanded .detail-grid { display: grid; }
        .expanded .chevron { transform: rotate(180deg); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 text-slate-900">

    <div class="max-w-5xl mx-auto">
        <header class="mb-10">
            <h1 class="text-3xl font-black tracking-tighter mb-6">Controlo de Pesagens</h1>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 bg-white p-6 rounded-3xl shadow-xl border border-slate-200">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1 tracking-widest">Data Trabalho</label>
                    <input type="date" id="filterDate" class="w-full border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none border font-semibold text-sm">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1 tracking-widest">Transportador</label>
                    <input type="text" id="filterTransp" placeholder="Nome do transportador..." class="w-full border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none border font-semibold text-sm">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1 tracking-widest">N.º Documento</label>
                    <input type="text" id="filterDoc" placeholder="Número doc..." class="w-full border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none border font-semibold text-sm">
                </div>
            </div>
        </header>

        <div id="loading" class="text-center py-20 text-slate-400 font-medium animate-pulse">A carregar dados do sistema...</div>
        <div id="container" class="space-y-4"></div>
    </div>

    <script>
        // --- SUBSTITUIR PELO TEU URL DO APPS SCRIPT ---
        const API_URL = 'https://script.google.com/macros/s/AKfycbxddOUfV3vKEEC6bwV12p-685zN9vMAVnTiZ6QNcP2w6zxkvMQKsKDy0phheBLCct1S/exec';
        
        let allData = [];

        // Trata data americana/ISO para DD/Mes (Portugal)
        function formatarDataPT(str) {
            if (!str) return '---';
            const d = new Date(str);
            if (isNaN(d)) return str;
            const meses = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];
            return `${d.getDate().toString().padStart(2, '0')}/${meses[d.getMonth()]}`;
        }

        // Trata horas estranhas (AM/PM ou durações do Sheets)
        function formatarHoraPT(str) {
            if (!str || str === "") return '---';
            let s = str.trim().toUpperCase();
            
            // Se tiver AM/PM, converte para 24h
            if (s.includes('AM') || s.includes('PM')) {
                const parts = s.match(/(\d+):(\d+)(?::\d+)?\s*(AM|PM)/);
                if (parts) {
                    let h = parseInt(parts[1]);
                    const m = parts[2];
                    if (parts[3] === 'PM' && h < 12) h += 12;
                    if (parts[3] === 'AM' && h === 12) h = 0;
                    return `${h.toString().padStart(2, '0')}:${m}`;
                }
            }
            // Se for HH:MM:SS, corta os segundos
            return s.split(':').slice(0, 2).join(':').padStart(5, '0').substring(0, 5);
        }

        async function fetchData() {
            try {
                const response = await fetch(API_URL);
                allData = await response.json();
                renderData(allData);
                document.getElementById('loading').style.display = 'none';
            } catch (error) {
                document.getElementById('loading').innerHTML = `<p class="text-red-500 font-bold text-lg">Erro na ligação à base de dados!</p>`;
            }
        }

        function renderData(data) {
            const container = document.getElementById('container');
            container.innerHTML = '';

            // Ordenação por Data (Mais recente primeiro)
            const sorted = data.sort((a, b) => new Date(b['Data Trabalho']) - new Date(a['Data Trabalho']));

            sorted.forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-3xl border border-slate-200 overflow-hidden cursor-pointer hover:border-blue-500 hover:shadow-2xl transition-all duration-300";
                card.onclick = () => card.classList.toggle('expanded');
                
                card.innerHTML = `
                    <div class="p-6 flex flex-col md:flex-row justify-between gap-4 items-center">
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-2 text-[10px] font-bold text-slate-400 uppercase tracking-tighter">
                                <span class="bg-slate-100 px-2 py-0.5 rounded text-slate-600">ID: ${item['N.º']}</span>
                                <span>DOC: ${item['N.º Documento Externo']}</span>
                            </div>
                            <div class="font-black text-slate-800 text-lg uppercase leading-tight">${item['Nome Local Entidade']}</div>
                        </div>
                        <div class="flex flex-wrap items-center gap-4 text-sm font-bold">
                            <div class="text-slate-500">${formatarDataPT(item['Data Trabalho'])}</div>
                            <div class="text-blue-600">${item['Lista Talões Pesagem.Nome Transporador']}</div>
                            <div class="bg-blue-600 text-white px-4 py-2 rounded-2xl flex items-center gap-2 shadow-lg shadow-blue-100">
                                <span class="text-[9px] opacity-70 uppercase tracking-widest">Chegada</span>
                                ${formatarHoraPT(item['Lista Talões Pesagem.Hora Chegada'])}
                                <svg class="chevron w-4 h-4 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>
                            </div>
                        </div>
                    </div>
                    <div class="detail-grid p-8 bg-slate-50 border-t border-slate-100 grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
                        ${createDetail("Viatura", item['Lista Talões Pesagem.Matricula Veiculo'])}
                        ${createDetail("Reboque", item['Lista Talões Pesagem.Matricula Reboque'])}
                        ${createDetail("Aut. Entrada", formatarHoraPT(item['Lista Talões Pesagem.Hora Autorização Entrada']))}
                        ${createDetail("Pesagem Ent.", formatarHoraPT(item['Lista Talões Pesagem.Hora Pesagem Entrada']))}
                        ${createDetail("Pesagem Saída", formatarHoraPT(item['Lista Talões Pesagem.Hora Pesagem Saída']))}
                        ${createDetail("Hora Partida", formatarHoraPT(item['Lista Talões Pesagem.Hora Partida']))}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function createDetail(label, val) {
            return `<div><p class="text-[9px] text-slate-400 uppercase font-black tracking-widest mb-1">${label}</p><p class="text-sm font-bold text-slate-800">${val || '---'}</p></div>`;
        }

        const runFilters = () => {
            const dateVal = document.getElementById('filterDate').value; // YYYY-MM-DD
            const transpVal = document.getElementById('filterTransp').value.toLowerCase();
            const docVal = document.getElementById('filterDoc').value.toLowerCase();

            const filtered = allData.filter(i => {
                // Normaliza a data do Sheets para comparar com o seletor HTML
                const dObj = new Date(i['Data Trabalho']);
                const dStr = dObj.getFullYear() + '-' + String(dObj.getMonth()+1).padStart(2,'0') + '-' + String(dObj.getDate()).padStart(2,'0');
                
                const mDate = dateVal ? dStr === dateVal : true;
                const mTrans = transpVal ? i['Lista Talões Pesagem.Nome Transporador'].toLowerCase().includes(transpVal) : true;
                const mDoc = docVal ? String(i['N.º Documento Externo']).toLowerCase().includes(docV) : true;
                
                return mDate && mTrans && mDoc;
            });
            renderData(filtered);
        };

        ['filterDate', 'filterTransp', 'filterDoc'].forEach(id => {
            document.getElementById(id).addEventListener('input', runFilters);
        });

        fetchData();
    </script>
</body>
</html>
