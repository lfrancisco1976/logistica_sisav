<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Cargas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <nav class="bg-blue-600 text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="flex justify-around max-w-md mx-auto">
            <button onclick="showPage('disponiveis')" class="flex flex-col items-center">
                <i class="fas fa-list"></i><span class="text-xs">Disponíveis</span>
            </button>
            <button onclick="showPage('agenda')" class="flex flex-col items-center">
                <i class="fas fa-calendar-alt"></i><span class="text-xs">Agenda</span>
            </button>
        </div>
    </nav>

    <main class="p-4 max-w-md mx-auto pb-20">
        
        <section id="page-disponiveis">
            <h2 class="text-xl font-bold mb-4 text-gray-800">Serviços por Processar</h2>
            <div id="lista-cards" class="space-y-4">
                <div class="animate-pulse bg-gray-200 h-32 rounded-xl"></div>
            </div>
        </section>

        <section id="page-agenda" class="hidden">
            <h2 class="text-xl font-bold mb-4 text-gray-800">Cargas Agendadas</h2>
            <div id="lista-agenda" class="space-y-3"></div>
        </section>
    </main>

    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4 z-[60]">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm">
            <h3 class="text-lg font-bold mb-4 text-blue-600">Programar Marcação</h3>
            <label class="block text-sm mb-1">Data</label>
            <input type="date" id="input-data" class="w-full border p-2 rounded mb-3">
            <label class="block text-sm mb-1">Hora (07:00 - 20:00)</label>
            <select id="input-hora" class="w-full border p-2 rounded mb-4">
                </select>
            <div class="flex gap-2">
                <button onclick="closeModal()" class="flex-1 py-2 bg-gray-200 rounded-lg">Cancelar</button>
                <button onclick="confirmarAgendamento()" class="flex-1 py-2 bg-blue-600 text-white rounded-lg">Confirmar</button>
            </div>
        </div>
    </div>

    <script>
        // Lógica de navegação e Mock de dados (Substituir pelos fetchs do Google Script)
        function showPage(pageId) {
            document.getElementById('page-disponiveis').classList.toggle('hidden', pageId !== 'disponiveis');
            document.getElementById('page-agenda').classList.toggle('hidden', pageId !== 'agenda');
        }

        function openModal(idDoc) {
            document.getElementById('modal').classList.remove('hidden');
            // Popular as horas das 07h às 20h
            const select = document.getElementById('input-hora');
            select.innerHTML = '';
            for(let h=7; h<=20; h++) {
                let hora = h < 10 ? '0'+h+':00' : h+':00';
                select.innerHTML += `<option value="${hora}">${hora}</option>`;
            }
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        // Exemplo de alerta de sobreposição
        function confirmarAgendamento() {
            const warning = confirm("Nota: Já existe uma carga neste horário. Deseja forçar a sobreposição?");
            if(warning) {
                alert("Agendado com sucesso!");
                closeModal();
            }
        }
    </script>
</body>
</html>
