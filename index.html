<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística Dashboard Portugal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .detail-grid { display: none; }
        .expanded .detail-grid { display: grid; }
        .expanded .chevron { transform: rotate(180deg); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <header class="mb-8">
            <h1 class="text-2xl font-bold text-slate-800 mb-6">Consulta de Pesagens</h1>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Data Trabalho</label>
                    <input type="date" id="filterDate" class="w-full border-slate-200 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none border text-sm">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Transportador</label>
                    <input type="text" id="filterTransp" placeholder="Procurar transportador..." class="w-full border-slate-200 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none border text-sm">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">N.º Documento Externo</label>
                    <input type="text" id="filterDoc" placeholder="Procurar documento..." class="w-full border-slate-200 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none border text-sm">
                </div>
            </div>
        </header>

        <div id="loading" class="text-center text-slate-500 mt-10 italic">A processar dados da base de dados...</div>
        <div id="container" class="space-y-4"></div>
    </div>

    <script>
        // SUBSTITUA PELO SEU URL DO APPS SCRIPT
        const API_URL = 'COLE_AQUI_O_SEU_URL_DO_APPS_SCRIPT';
        
        let allData = [];

        // Função para formatar data para PT (DD/MM/AAAA)
        function formatarDataPT(dateStr) {
            if (!dateStr) return '---';
            const date = new Date(dateStr);
            if (isNaN(date)) return dateStr; // Se não conseguir converter, mantém original
            return date.toLocaleDateString('pt-PT');
        }

        // Função para formatar hora para PT (HH:MM)
        function formatarHoraPT(timeStr) {
            if (!timeStr) return '---';
            // Tenta extrair apenas HH:mm caso venha com segundos ou data completa
            const match = timeStr.match(/(\d{2}:\d{2})/);
            return match ? match[1] : timeStr;
        }

        async function fetchData() {
            try {
                const response = await fetch(API_URL);
                allData = await response.json();
                renderData(allData);
                document.getElementById('loading').style.display = 'none';
            } catch (error) {
                document.getElementById('loading').innerText = "Erro na ligação. Verifique as permissões do Apps Script.";
            }
        }

        function renderData(data) {
            const container = document.getElementById('container');
            container.innerHTML = '';

            // Ordenação por Data e Hora (Mais recentes primeiro)
            const sorted = data.sort((a, b) => {
                const d1 = new Date(`${a['Data Trabalho']} ${a['Lista Talões Pesagem.Hora Chegada']}`);
                const d2 = new Date(`${b['Data Trabalho']} ${b['Lista Talões Pesagem.Hora Chegada']}`);
                return d2 - d1;
            });

            sorted.forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden cursor-pointer hover:border-blue-400 transition-all";
                card.onclick = () => card.classList.toggle('expanded');
                
                card.innerHTML = `
                    <div class="p-5 flex flex-col md:flex-row justify-between gap-4 items-start md:items-center">
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="bg-blue-100 text-blue-700 text-[10px] font-bold px-2 py-0.5 rounded">N.º ${item['N.º']}</span>
                                <span class="text-[10px] font-mono text-slate-400 uppercase font-semibold">DOC: ${item['N.º Documento Externo']}</span>
                            </div>
                            <div class="font-bold text-slate-800 text-lg uppercase leading-tight">${item['Nome Local Entidade']}</div>
                        </div>
                        <div class="flex flex-wrap items-center gap-3 text-sm">
                            <div class="text-slate-600 bg-slate-50 px-2 py-1 rounded border border-slate-100 font-medium">
                                ${formatarDataPT(item['Data Trabalho'])}
                            </div>
                            <div class="font-semibold text-slate-700 underline decoration-blue-200">
                                ${item['Lista Talões Pesagem.Nome Transporador']}
                            </div>
                            <div class="bg-blue-600 text-white px-3 py-1 rounded-full font-bold flex items-center gap-1">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                                ${formatarHoraPT(item['Lista Talões Pesagem.Hora Chegada'])}
                            </div>
                            <svg class="chevron transition-transform text-slate-300" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                        </div>
                    </div>
                    <div class="detail-grid p-6 bg-slate-50 border-t border-slate-100 grid-cols-2 md:grid-cols-4 gap-6 animate-in fade-in">
                        ${createDetail("Viatura", item['Lista Talões Pesagem.Matricula Veiculo'])}
                        ${createDetail("Reboque", item['Lista Talões Pesagem.Matricula Reboque'])}
                        ${createDetail("Aut. Entrada", formatarHoraPT(item['Lista Talões Pesagem.Hora Autorização Entrada']))}
                        ${createDetail("Pesagem Ent.", formatarHoraPT(item['Lista Talões Pesagem.Hora Pesagem Entrada']))}
                        ${createDetail("Pesagem Saída", formatarHoraPT(item['Lista Talões Pesagem.Hora Pesagem Saída']))}
                        ${createDetail("Hora Partida", formatarHoraPT(item['Lista Talões Pesagem.Hora Partida']))}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function createDetail(label, value) {
            return `<div><p class="text-[10px] text-slate-400 uppercase font-black tracking-wider mb-1">${label}</p><p class="text-sm font-bold text-slate-700">${value || '---'}</p></div>`;
        }

        const filterEvents = () => {
            const dValue = document.getElementById('filterDate').value;
            const tValue = document.getElementById('filterTransp').value.toLowerCase();
            const docValue = document.getElementById('filterDoc').value.toLowerCase();

            const filtered = allData.filter(item => {
                const dateMatch = dValue ? item['Data Trabalho'].includes(dValue) : true;
                const transpMatch = tValue ? item['Lista Talões Pesagem.Nome Transporador'].toLowerCase().includes(tValue) : true;
                const docMatch = docValue ? String(item['N.º Documento Externo']).toLowerCase().includes(docValue) : true;
                return dateMatch && transpMatch && docMatch;
            });
            renderData(filtered);
        };

        document.getElementById('filterDate').addEventListener('input', filterEvents);
        document.getElementById('filterTransp').addEventListener('input', filterEvents);
        document.getElementById('filterDoc').addEventListener('input', filterEvents);

        fetchData();
    </script>
</body>
</html>
