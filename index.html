<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    <style>
        .active-tab { color: #2563eb; border-top: 2px solid #2563eb; }
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24 font-sans">

    <header class="bg-white p-4 sticky top-0 z-50 shadow-sm">
        <div class="max-w-md mx-auto space-y-3">
            <h1 class="text-center text-slate-800 font-black text-xl tracking-tight">GESTÃO DE CARGAS</h1>
            <div class="relative">
                <i class="fas fa-search absolute left-3 top-3 text-slate-400"></i>
                <input type="text" id="filtro-geral" placeholder="Filtrar por data (dd/mm/aaaa)..." 
                       class="w-full bg-slate-100 border-none rounded-2xl py-2.5 pl-10 pr-4 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                       oninput="filtrarCards()">
            </div>
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto">
        <section id="aba-disponiveis">
            <div id="lista-disponiveis" class="space-y-4">
                <div class="text-center py-10 text-slate-400 text-sm">A carregar serviços...</div>
            </div>
        </section>

        <section id="aba-agenda" class="hidden">
            <div id="lista-agenda" class="space-y-3"></div>
        </section>
    </main>

    <div id="modal-agendamento" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden flex items-end sm:items-center justify-center z-[100]">
        <div class="bg-white w-full max-w-md rounded-t-3xl sm:rounded-3xl p-6 animate-in slide-in-from-bottom duration-300">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-lg font-bold text-slate-800">Programar Horário</h3>
                <button onclick="fecharModal()" class="text-slate-400 text-2xl">&times;</button>
            </div>
            
            <div id="modal-info" class="mb-6 p-4 bg-blue-50 rounded-2xl text-sm text-blue-800 border border-blue-100"></div>

            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1 uppercase">Data da Marcação</label>
                    <input type="date" id="input-data" class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1 uppercase">Janela de 1 Hora</label>
                    <select id="input-hora" class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                        </select>
                </div>
                <button onclick="salvarMarcacao()" id="btn-save" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-transform">
                    Confirmar Marcação
                </button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 flex justify-around items-center h-20 z-50">
        <button onclick="mudarAba('disponiveis')" id="nav-disponiveis" class="flex flex-col items-center gap-1 transition-colors active-tab">
            <i class="fas fa-boxes-stacked text-xl"></i>
            <span class="text-[10px] font-bold uppercase">Disponíveis</span>
        </button>
        <button onclick="mudarAba('agenda')" id="nav-agenda" class="flex flex-col items-center gap-1 text-slate-400 transition-colors">
            <i class="fas fa-calendar-check text-xl"></i>
            <span class="text-[10px] font-bold uppercase">Agenda</span>
        </button>
    </nav>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzev4peCOh5EPTY9mX-aqPOVOPkzStJWUClCqZIlIN3UNkWJnppXq_yYCQIcsBiqXzX/exec";
        let dbDisponiveis = [];
        let dbAgenda = [];
        let itemAtual = null;

        // Inicializar
        window.onload = () => {
            gerarOpcoesHora();
            carregarDados();
        };

        function gerarOpcoesHora() {
            const select = document.getElementById('input-hora');
            for(let i=7; i<=20; i++) {
                let h = i < 10 ? `0${i}:00` : `${i}:00`;
                select.innerHTML += `<option value="${h}">${h}</option>`;
            }
        }

        async function carregarDados() {
            try {
                const [res1, res2] = await Promise.all([
                    fetch(`${API}?action=getFolha1`),
                    fetch(`${API}?action=getFolha2`)
                ]);
                dbDisponiveis = await res1.json();
                dbAgenda = await res2.json();
                filtrarCards();
            } catch (e) {
                console.error("Erro na API", e);
            }
        }

        function filtrarCards() {
            const busca = document.getElementById('filtro-geral').value.toLowerCase();
            
            // Render Disponíveis
            const filteredDisp = dbDisponiveis.filter(i => i.dataTrabalho.toLowerCase().includes(busca));
            document.getElementById('lista-disponiveis').innerHTML = filteredDisp.map(item => `
                <div class="bg-white rounded-2xl p-4 card-shadow border-l-4 border-blue-500">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[10px] bg-slate-100 text-slate-600 px-2 py-1 rounded font-bold">${item.idDoc}</span>
                        <span class="text-[10px] text-slate-400 font-medium tracking-tight"><i class="far fa-calendar mr-1"></i>${item.dataTrabalho}</span>
                    </div>
                    <h4 class="font-bold text-slate-800 leading-tight mb-4">${item.local}</h4>
                    <button onclick='abrirModal(${JSON.stringify(item)})' class="w-full bg-slate-800 text-white text-xs font-bold py-3 rounded-xl active:bg-blue-600 transition-colors">
                        AGENDAR CARGA
                    </button>
                </div>
            `).join('');

            // Render Agenda
            const filteredAgen = dbAgenda.filter(i => i.dataMarcacao.toLowerCase().includes(busca));
            document.getElementById('lista-agenda').innerHTML = filteredAgen.map(item => `
                <div class="bg-white rounded-2xl p-4 card-shadow border-l-4 border-emerald-500">
                    <div class="flex justify-between items-center">
                        <div>
                            <span class="text-xl font-black text-slate-800">${item.horaMarcacao}</span>
                            <span class="text-[10px] block text-emerald-600 font-bold uppercase">${item.dataMarcacao}</span>
                        </div>
                        <div class="flex gap-4">
                            <button onclick="removerRegistro('${item.rowId}')" class="text-slate-300 hover:text-red-500"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>
                    <div class="mt-3 pt-3 border-t border-slate-50">
                        <p class="text-xs font-bold text-slate-700 uppercase">${item.local}</p>
                        <p class="text-[10px] text-slate-400">Doc: ${item.idDoc} | IE: ${item.idIE}</p>
                    </div>
                </div>
            `).join('');
        }

        function abrirModal(item) {
            itemAtual = item;
            document.getElementById('modal-info').innerHTML = `<strong>${item.local}</strong><br>Documento: ${item.idDoc}`;
            document.getElementById('modal-agendamento').classList.remove('hidden');
        }

        function fecharModal() {
            document.getElementById('modal-agendamento').classList.add('hidden');
            itemAtual = null;
        }

        async function salvarMarcacao() {
            const dataM = document.getElementById('input-data').value;
            const horaM = document.getElementById('input-hora').value;
            
            if(!dataM) return alert("Por favor, selecione a data.");

            // Alerta de sobreposição simplificado
            const conflito = dbAgenda.some(a => a.dataMarcacao === dataM && a.horaMarcacao === horaM);
            if(conflito && !confirm("Já existe uma carga neste horário. Pretende forçar a sobreposição?")) return;

            const btn = document.getElementById('btn-save');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch animate-spin"></i> A gravar...';

            const payload = { ...itemAtual, dataMarcacao: dataM, horaMarcacao: horaM };

            try {
                await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                alert("Marcação realizada com sucesso!");
                fecharModal();
                carregarDados();
                mudarAba('agenda');
            } catch (e) {
                alert("Erro ao gravar. Tente novamente.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = "Confirmar Marcação";
            }
        }

        async function removerRegistro(rowId) {
            if(!confirm("Tem a certeza que deseja eliminar esta marcação?")) return;
            await fetch(`${API}?action=delete&rowId=${rowId}`);
            carregarDados();
        }

        function mudarAba(aba) {
            document.getElementById('aba-disponiveis').classList.toggle('hidden', aba !== 'disponiveis');
            document.getElementById('aba-agenda').classList.toggle('hidden', aba !== 'agenda');
            document.getElementById('nav-disponiveis').classList.toggle('active-tab', aba === 'disponiveis');
            document.getElementById('nav-agenda').classList.toggle('active-tab', aba === 'agenda');
            document.getElementById('nav-disponiveis').classList.toggle('text-slate-400', aba !== 'disponiveis');
            document.getElementById('nav-agenda').classList.toggle('text-slate-400', aba !== 'agenda');
        }
    </script>
</body>
</html>
