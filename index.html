<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística Dashboard PT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .detail-grid { display: none; }
        .expanded .detail-grid { display: grid; }
        .expanded .chevron { transform: rotate(180deg); }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <header class="mb-8">
            <h1 class="text-3xl font-black text-slate-900 mb-6 tracking-tight">Gestão de Pesagens</h1>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 bg-white p-5 rounded-2xl shadow-md border border-slate-200">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1 tracking-widest">Data Trabalho</label>
                    <input type="date" id="filterDate" class="w-full border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none border text-sm font-medium">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1 tracking-widest">Transportador</label>
                    <input type="text" id="filterTransp" placeholder="Ex: Transitex..." class="w-full border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none border text-sm font-medium">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1 tracking-widest">N.º Doc Externo</label>
                    <input type="text" id="filterDoc" placeholder="Procurar número..." class="w-full border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none border text-sm font-medium">
                </div>
            </div>
        </header>

        <div id="loading" class="text-center text-slate-400 mt-20 animate-pulse font-medium">A sincronizar com Google Sheets...</div>
        <div id="container" class="space-y-4"></div>
    </div>

    <script>
        // --- COLA AQUI O TEU URL DO APPS SCRIPT ---
        const API_URL = 'https://script.google.com/macros/s/AKfycbxplwx58fA_yZD2IsvJ8goxhQpR0N5WABdEAzcTxikRKQw9YQ6fmdJxUEuow6xiLM9R/exec';
        
        let allData = [];

        // Formata MM/DD/YYYY -> DD/Mes (Ex: 20/Mar)
        function formatarDataPT(str) {
            if (!str) return '---';
            const d = new Date(str);
            if (isNaN(d)) return str;
            const meses = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];
            return `${d.getDate().toString().padStart(2, '0')}/${meses[d.getMonth()]}`;
        }

        // Formata HH:MM:SS AM/PM -> HH:MM 24h
        function formatarHoraPT(str) {
            if (!str || str === "") return '---';
            // Tenta converter se for formato data/hora completo
            const d = new Date(`2026-01-01 ${str}`);
            if (isNaN(d)) return str.substring(0, 5); // Fallback caso já venha formatado
            return d.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit', hour12: false });
        }

        async function fetchData() {
            try {
                const response = await fetch(API_URL);
                allData = await response.json();
                renderData(allData);
                document.getElementById('loading').style.display = 'none';
            } catch (error) {
                document.getElementById('loading').innerHTML = `<span class="text-red-500">Erro de ligação. Verifique o link e as permissões.</span>`;
            }
        }

        function renderData(data) {
            const container = document.getElementById('container');
            container.innerHTML = '';

            // Ordenação por Data e Hora Chegada (Descendente)
            const sorted = data.sort((a, b) => {
                const da = new Date(`${a['Data Trabalho']} ${a['Lista Talões Pesagem.Hora Chegada']}`);
                const db = new Date(`${b['Data Trabalho']} ${b['Lista Talões Pesagem.Hora Chegada']}`);
                return db - da;
            });

            sorted.forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden cursor-pointer hover:shadow-lg hover:border-blue-400 transition-all duration-300";
                card.onclick = () => card.classList.toggle('expanded');
                
                card.innerHTML = `
                    <div class="p-5 flex flex-col md:flex-row justify-between gap-4 items-start md:items-center">
                        <div class="flex-1">
                            <div class="flex items-center gap-3 mb-2">
                                <span class="bg-blue-600 text-white text-[10px] font-black px-2 py-1 rounded-lg">N.º ${item['N.º']}</span>
                                <span class="text-[10px] font-bold text-slate-400 tracking-tighter uppercase leading-none">DOC: ${item['N.º Documento Externo']}</span>
                            </div>
                            <div class="font-black text-slate-800 text-xl uppercase tracking-tight leading-tight">${item['Nome Local Entidade']}</div>
                        </div>
                        <div class="flex flex-wrap items-center gap-3 text-sm">
                            <div class="flex flex-col items-end">
                                <span class="text-[9px] text-slate-400 font-bold uppercase">Data</span>
                                <span class="font-bold text-slate-700">${formatarDataPT(item['Data Trabalho'])}</span>
                            </div>
                            <div class="h-8 w-px bg-slate-100 mx-1 hidden md:block"></div>
                            <div class="flex flex-col items-end">
                                <span class="text-[9px] text-slate-400 font-bold uppercase">Transportador</span>
                                <span class="font-bold text-blue-600">${item['Lista Talões Pesagem.Nome Transporador']}</span>
                            </div>
                            <div class="bg-slate-900 text-white px-4 py-2 rounded-xl font-black flex items-center gap-2 ml-2 shadow-sm">
                                <span class="text-[10px] text-slate-400">CHEGADA</span>
                                ${formatarHoraPT(item['Lista Talões Pesagem.Hora Chegada'])}
                                <svg class="chevron w-4 h-4 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>
                            </div>
                        </div>
                    </div>
                    <div class="detail-grid p-6 bg-slate-50 border-t border-slate-100 grid-cols-2 md:grid-cols-4 gap-6 animate-in">
                        ${createDetail("Matrícula Veículo", item['Lista Talões Pesagem.Matricula Veiculo'])}
                        ${createDetail("Matrícula Reboque", item['Lista Talões Pesagem.Matricula Reboque'])}
                        ${createDetail("Aut. Entrada", formatarHoraPT(item['Lista Talões Pesagem.Hora Autorização Entrada']))}
                        ${createDetail("Pesagem Entrada", formatarHoraPT(item['Lista Talões Pesagem.Hora Pesagem Entrada']))}
                        ${createDetail("Pesagem Saída", formatarHoraPT(item['Lista Talões Pesagem.Hora Pesagem Saída']))}
                        ${createDetail("Hora Partida", formatarHoraPT(item['Lista Talões Pesagem.Hora Partida']))}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function createDetail(label, val) {
            return `<div><p class="text-[10px] text-slate-400 uppercase font-black mb-1 tracking-widest">${label}</p><p class="text-sm font-bold text-slate-700 underline decoration-slate-200 underline-offset-4">${val || '---'}</p></div>`;
        }

        const filterHandler = () => {
            const dateV = document.getElementById('filterDate').value;
            const transpV = document.getElementById('filterTransp').value.toLowerCase();
            const docV = document.getElementById('filterDoc').value.toLowerCase();

            const filtered = allData.filter(i => {
                const matchD = dateV ? i['Data Trabalho'].includes(dateV) : true;
                const matchT = transpV ? i['Lista Talões Pesagem.Nome Transporador'].toLowerCase().includes(transpV) : true;
                const matchDoc = docV ? String(i['N.º Documento Externo']).toLowerCase().includes(docV) : true;
                return matchD && matchT && matchDoc;
            });
            renderData(filtered);
        };

        ['filterDate', 'filterTransp', 'filterDoc'].forEach(id => {
            document.getElementById(id).addEventListener('input', filterHandler);
        });

        fetchData();
    </script>
</body>
</html>
