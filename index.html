<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    <style>
        .aba-ativa { color: #2563eb; border-top: 3px solid #2563eb; font-weight: 900; }
        input[type="date"] { color-scheme: light; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24 font-sans">

    <header class="bg-white p-4 sticky top-0 z-50 shadow-sm border-b">
        <div class="max-w-md mx-auto flex flex-col gap-3">
            <h1 class="text-center text-slate-800 font-black text-lg tracking-tighter uppercase">Gestão de Cargas</h1>
            <div class="flex items-center gap-2 bg-slate-100 p-2 rounded-2xl border border-slate-200">
                <i class="fas fa-calendar-day text-slate-400 ml-2"></i>
                <input type="date" id="filtro-data" class="bg-transparent text-sm w-full outline-none font-bold text-slate-600" onchange="renderizar()">
                <button onclick="limparFiltro()" class="text-[10px] bg-white px-3 py-1.5 rounded-xl shadow-sm font-bold text-blue-600 active:scale-95">LIMPAR</button>
            </div>
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto">
        <div id="seccao-disponiveis">
            <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Pendentes na Folha 1</h2>
            <div id="lista-disponiveis" class="space-y-4">
                <div class="text-center py-10 text-slate-300 italic">A carregar dados...</div>
            </div>
        </div>

        <div id="seccao-agenda" class="hidden">
            <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Confirmados na Folha 2</h2>
            <div id="lista-agenda" class="space-y-3"></div>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 bg-slate-900/70 backdrop-blur-sm hidden flex items-center justify-center z-[100] p-4">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl">
            <h3 id="modal-titulo" class="text-xl font-black text-slate-800 mb-2">Programar Carga</h3>
            <div id="modal-info" class="mb-6 p-4 bg-blue-50 rounded-2xl text-[11px] text-blue-900 border border-blue-100"></div>
            
            <div class="space-y-5">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 mb-1 uppercase ml-1">Data do Agendamento</label>
                    <input type="date" id="data-agendar" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl outline-none font-bold">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 mb-1 uppercase ml-1">Janela Horária</label>
                    <select id="hora-agendar" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl outline-none font-bold"></select>
                </div>
                <button onclick="salvarServico()" id="btn-finalizar" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-lg shadow-blue-200 active:scale-95 transition-all uppercase tracking-widest">Confirmar</button>
                <button onclick="fecharModal()" class="w-full text-slate-400 text-[10px] font-black uppercase tracking-widest py-2">Voltar</button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around items-center h-20 z-50 shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
        <button onclick="trocarAba('disponiveis')" id="nav-disponiveis" class="flex flex-col items-center gap-1 aba-ativa w-1/2">
            <i class="fas fa-layer-group text-lg"></i><span class="text-[9px] font-black uppercase tracking-tighter">Disponíveis</span>
        </button>
        <button onclick="trocarAba('agenda')" id="nav-agenda" class="flex flex-col items-center gap-1 text-slate-300 w-1/2">
            <i class="fas fa-calendar-check text-lg"></i><span class="text-[9px] font-black uppercase tracking-tighter">Agenda</span>
        </button>
    </nav>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwoljETktAAazbwY6U03H--EUTYkoPPXRz5loDA5MOD-BFZa8FJrkuKGRnnjj01Pc_6/exec";
        let dbDisp = []; let dbAgen = [];
        let objSelecionado = null; let isEdit = false;

        window.onload = () => {
            const selHora = document.getElementById('hora-agendar');
            for(let h=7; h<=20; h++) {
                let horaStr = (h < 10 ? '0'+h : h) + ':00';
                selHora.innerHTML += `<option value="${horaStr}">${horaStr}</option>`;
            }
            carregarDados();
        };

        async function carregarDados() {
            try {
                const [r1, r2] = await Promise.all([
                    fetch(`${API_URL}?action=getFolha1`).then(r => r.json()),
                    fetch(`${API_URL}?action=getFolha2`).then(r => r.json())
                ]);
                dbDisp = r1; dbAgen = r2;
                renderizar();
            } catch (e) { alert("Erro de conexão com a Sheet."); }
        }

        function renderizar() {
            const dataFiltro = document.getElementById('filtro-data').value;
            const dataFormatada = dataFiltro ? dataFiltro.split('-').reverse().join('/') : "";

            // Render Disponíveis
            const fDisp = dataFormatada ? dbDisp.filter(i => i.dataTrabalho === dataFormatada) : dbDisp;
            document.getElementById('lista-disponiveis').innerHTML = fDisp.map(i => `
                <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 relative overflow-hidden">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[9px] font-black bg-slate-100 text-slate-500 px-2 py-1 rounded-lg uppercase tracking-tighter">DOC: ${i.idDoc}</span>
                        <span class="text-[10px] font-bold text-blue-500">${i.dataTrabalho}</span>
                    </div>
                    <h4 class="font-black text-slate-800 leading-snug mb-5 uppercase text-sm">${i.local}</h4>
                    <button onclick='abrirModal(${JSON.stringify(i)}, false)' class="w-full bg-slate-800 text-white text-[10px] font-black py-3.5 rounded-xl uppercase tracking-widest active:bg-blue-600 transition-colors">Agendar Agora</button>
                </div>
            `).join('');

            // Render Agenda
            const fAgen = dataFormatada ? dbAgen.filter(i => i.dataMarcacao === dataFormatada) : dbAgen;
            fAgen.sort((a,b) => a.horaMarcacao.localeCompare(b.horaMarcacao));
            document.getElementById('lista-agenda').innerHTML = fAgen.map(i => `
                <div class="bg-white rounded-2xl p-4 shadow-sm border-l-[6px] border-emerald-500 flex justify-between items-center">
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-0.5">
                            <span class="text-xl font-black text-slate-800">${i.horaMarcacao}</span>
                            <span class="text-[9px] font-black text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded-full uppercase">${i.dataMarcacao}</span>
                        </div>
                        <p class="text-[10px] font-bold text-slate-500 leading-tight uppercase">${i.local}</p>
                    </div>
                    <div class="flex gap-1">
                        <button onclick='abrirModal(${JSON.stringify(i)}, true)' class="text-slate-300 hover:text-blue-500 p-2 text-lg"><i class="fas fa-edit"></i></button>
                        <button onclick="apagar('${i.rowId}')" class="text-slate-300 hover:text-red-500 p-2 text-lg"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function abrirModal(item, editar) {
            objSelecionado = item; isEdit = editar;
            document.getElementById('modal-titulo').innerText = editar ? "Editar Horário" : "Agendar Carga";
            document.getElementById('modal-info').innerHTML = `<strong>LOCAL:</strong> ${item.local}<br><strong>DOC:</strong> ${item.idDoc}`;
            document.getElementById('modal').classList.remove('hidden');
        }

        async function salvarServico() {
            const d = document.getElementById('data-agendar').value;
            const h = document.getElementById('hora-agendar').value;
            if(!d) return alert("Por favor, selecione uma data.");

            const dataPT = d.split('-').reverse().join('/');
            const btn = document.getElementById('btn-finalizar');
            btn.disabled = true; btn.innerText = "A PROCESSAR...";

            const payload = {
                action: isEdit ? 'edit' : 'create',
                rowId: objSelecionado.rowId,
                idDoc: objSelecionado.idDoc, idIE: objSelecionado.idIE, local: objSelecionado.local,
                dataTrabalho: objSelecionado.dataTrabalho,
                dataMarcacao: dataPT, horaMarcacao: h
            };

            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                fecharModal();
                setTimeout(carregarDados, 1500); // Dá tempo ao Google de atualizar
                if(!isEdit) trocarAba('agenda');
            } catch(e) { alert("Erro ao guardar."); }
            finally { btn.disabled = false; btn.innerText = "Confirmar"; }
        }

        async function apagar(id) {
            if(!confirm("Deseja eliminar este agendamento?")) return;
            await fetch(`${API_URL}?action=delete&rowId=${id}`);
            carregarDados();
        }

        function trocarAba(aba) {
            document.getElementById('seccao-disponiveis').classList.toggle('hidden', aba !== 'disponiveis');
            document.getElementById('seccao-agenda').classList.toggle('hidden', aba !== 'agenda');
            document.getElementById('nav-disponiveis').classList.toggle('aba-ativa', aba === 'disponiveis');
            document.getElementById('nav-agenda').classList.toggle('aba-ativa', aba === 'agenda');
            document.getElementById('nav-disponiveis').classList.toggle('text-slate-300', aba !== 'disponiveis');
            document.getElementById('nav-agenda').classList.toggle('text-slate-300', aba !== 'agenda');
        }

        function fecharModal() { document.getElementById('modal').classList.add('hidden'); }
        function limparFiltro() { document.getElementById('filtro-data').value = ""; renderizar(); }
    </script>
</body>
</html>
